<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<section class="hero" id="hero" style="min-height: 100vh;">
  <div class="hero__bg">
    <div class="hero__grain"></div>
  </div>
  <div class="hero__content" style="text-align: center;">
    <div class="hero__eyebrow reveal">Error 404</div>
    <h1 class="hero__title reveal">
      <span class="hero__name hero__name--accent" style="font-size: clamp(5rem, 15vw, 12rem);">404</span>
    </h1>
    <p class="hero__subtitle reveal" style="margin-bottom: 2rem;">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div class="hero__actions reveal">
      <a href="/" class="btn btn--primary">Back Home</a>
    </div>
  </div>
</section>

<script src="assets/js/main.js"></script>
</body>
</html>
